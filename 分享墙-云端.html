<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分享墙 · 云端协作版</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f5f4f1; --card: #fff; --text: #1a1a1a; --muted: #6b6b6b;
      --border: #e8e6e1; --accent: #2d6a4f; --accent-hover: #1b4332;
      --danger: #c1121f; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6; font-size: 15px; }
    .page { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .header { text-align: center; margin-bottom: 1rem; }
    .header h1 { margin: 0; font-size: 1.75rem; }
    .subtitle { color: var(--muted); font-size: 0.95rem; margin: 0.5rem 0 0; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .section-title { margin: 0 0 1rem; font-size: 1rem; font-weight: 600; }
    .field { display: block; margin-bottom: 0.85rem; }
    .field > span { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.3rem; }
    input[type="text"], input[type="url"], input[type="password"], textarea {
      width: 100%; font: inherit; padding: 0.6rem 0.85rem; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg);
    }
    textarea { min-height: 88px; resize: vertical; }
    .btn { font: inherit; font-weight: 500; cursor: pointer; border: none; border-radius: 8px;
      padding: 0.55rem 1rem; }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn.ghost:hover { background: var(--bg); color: var(--text); }
    .btn.small { padding: 0.35rem 0.75rem; font-size: 0.85rem; }
    .btn.danger { color: var(--danger); border-color: #f5c2c7; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .status { font-size: 0.85rem; color: var(--muted); }
    .status.ok { color: var(--accent); }
    .status.err { color: var(--danger); }
    .hint { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin: 0 0 1rem; }
    .posts { display: flex; flex-direction: column; gap: 1rem; }
    .post { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.25rem 1.5rem; }
    .post-text { margin: 0 0 0.75rem; white-space: pre-wrap; word-break: break-word; }
    .post-link { color: var(--accent); word-break: break-all; display: inline-block; margin-bottom: 0.75rem; }
    .post-image { max-width: 100%; max-height: 360px; border-radius: 8px; display: block; margin-bottom: 0.75rem; }
    .post-meta { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 0.5rem;
      padding-top: 0.75rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); }
    .post-actions { display: flex; gap: 0.5rem; }
    .empty { text-align: center; color: var(--muted); padding: 2rem; }
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff; padding: 0.65rem 1.25rem; border-radius: 8px; z-index: 99; }
    .toast.error { background: var(--danger); }
    #setupPanel[hidden], #appPanel[hidden] { display: none !important; }
    .preview { margin-top: 0.5rem; max-height: 200px; overflow: hidden; border-radius: 8px; border: 1px solid var(--border); }
    .preview img { width: 100%; max-height: 200px; object-fit: cover; }
    .checkbox { font-size: 0.85rem; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
    .share-box { font-size: 0.82rem; color: var(--muted); word-break: break-all; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>分享墙 · 云端版</h1>
      <p class="subtitle">线上共享，远程发表、编辑与刷新同步</p>
    </header>

    <section id="setupPanel" class="card">
      <h2 class="section-title">首次配置（仅需一次）</h2>
      <p class="hint">
        <strong>手机与电脑要看到相同内容，必须完成下方配置。</strong><br>
        1. 打开 <a href="https://supabase.com" target="_blank" rel="noopener">supabase.com</a> 注册并新建项目<br>
        2. SQL Editor 中运行仓库里的 <code>cloud/supabase-setup.sql</code><br>
        3. Settings → API 复制 URL 与 anon 密钥，填到下方（或编辑 <code>cloud-config.js</code> 后 Push 到 GitHub）
      </p>
      <label class="field">
        <span>Supabase 项目 URL</span>
        <input type="text" id="cfgUrl" placeholder="https://xxxx.supabase.co" />
      </label>
      <label class="field">
        <span>anon 公钥（Settings → API）</span>
        <input type="password" id="cfgKey" placeholder="eyJhbGciOi..." />
      </label>
      <label class="field">
        <span>房间号（与他人共用须一致）</span>
        <input type="text" id="cfgBoard" placeholder="例如 family2025" />
      </label>
      <div class="row">
        <button type="button" class="btn primary" id="connectBtn">保存并连接</button>
        <span class="status" id="setupStatus"></span>
      </div>
    </section>

    <div id="appPanel" hidden>
      <div class="card">
        <div class="row" style="justify-content: space-between;">
          <span class="status ok" id="connInfo">已连接</span>
          <div class="row">
            <span class="status">房间：<strong id="boardLabel"></strong></span>
            <button type="button" class="btn ghost small" id="shareBtn">复制分享链接</button>
            <button type="button" class="btn ghost small" id="refreshBtn">刷新</button>
            <button type="button" class="btn ghost small" id="settingsBtn">改配置</button>
          </div>
        </div>
        <p class="share-box" id="shareHint">把同一链接发给他人，即可远程查看与编辑（每 30 秒自动刷新）</p>
      </div>

      <section class="card">
        <h2 class="section-title" id="formTitle">发表内容</h2>
        <form id="postForm">
          <input type="hidden" id="editId" />
          <label class="field"><span>文字</span>
            <textarea id="text" rows="4" placeholder="写下你想分享的内容…"></textarea>
          </label>
          <label class="field"><span>链接</span>
            <input type="url" id="link" placeholder="https://example.com" />
          </label>
          <label class="field"><span>图片</span>
            <input type="file" id="image" accept="image/jpeg,image/png,image/gif,image/webp" />
            <label class="checkbox" id="removeImageWrap" hidden>
              <input type="checkbox" id="removeImage" /> 移除当前图片
            </label>
            <div class="preview" id="preview" hidden><img id="previewImg" alt="" /></div>
          </label>
          <div class="row">
            <button type="submit" class="btn primary" id="submitBtn">发布</button>
            <button type="button" class="btn ghost" id="cancelEdit" hidden>取消编辑</button>
          </div>
        </form>
      </section>

      <section>
        <h2 class="section-title">全部内容（云端同步）</h2>
        <div id="posts" class="posts"></div>
        <p id="empty" class="empty" hidden>还没有内容，发表第一条吧。</p>
      </section>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="cloud-config.js"></script>
  <script>
    const CFG_KEY = "share-board-cloud-config";
    const BUCKET = "share-board";

    let supabase = null;
    let boardId = "main";
    let pendingFile = null;
    let currentImagePath = "";
    let toastTimer;
    let refreshTimer = null;

    const $ = (s) => document.querySelector(s);
    const setupPanel = $("#setupPanel");
    const appPanel = $("#appPanel");
    const postsEl = $("#posts");
    const emptyEl = $("#empty");
    const toastEl = $("#toast");

    function showToast(msg, err) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.className = "toast" + (err ? " error" : "");
      toastEl.hidden = false;
      toastTimer = setTimeout(() => { toastEl.hidden = true; }, 3000);
    }

    function loadConfig() {
      try {
        return JSON.parse(localStorage.getItem(CFG_KEY) || "null");
      } catch {
        return null;
      }
    }

    function saveConfig(cfg) {
      localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
    }

    function getBuiltInConfig() {
      const b = window.SHARE_BOARD_CLOUD || {};
      return {
        url: (b.url || "").trim(),
        key: (b.key || "").trim(),
        board: (b.board || "main").trim() || "main",
      };
    }

    function shareUrl() {
      const u = new URL(location.href);
      u.searchParams.set("board", boardId);
      return u.toString();
    }

    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => { renderPosts(); }, 30000);
    }

    function formatTime(iso) {
      return new Date(iso).toLocaleString("zh-CN", {
        month: "short", day: "numeric", hour: "2-digit", minute: "2-digit",
      });
    }

    function publicImageUrl(path) {
      if (!path || !supabase) return "";
      const { data } = supabase.storage.from(BUCKET).getPublicUrl(path);
      return data.publicUrl;
    }

    async function connect(cfg) {
      const url = (cfg.url || "").trim();
      const key = (cfg.key || "").trim();
      boardId = (cfg.board || "main").trim() || "main";
      if (!url || !key) {
        showToast("请填写 URL 和 anon 密钥", true);
        return false;
      }
      supabase = window.supabase.createClient(url, key);
      const { error } = await supabase.from("share_posts").select("id").limit(1);
      if (error) {
        $("#setupStatus").textContent = error.message;
        $("#setupStatus").className = "status err";
        showToast("连接失败：" + error.message, true);
        return false;
      }
      saveConfig({ url, key, board: boardId });
      $("#setupStatus").textContent = "连接成功";
      $("#setupStatus").className = "status ok";
      setupPanel.hidden = true;
      appPanel.hidden = false;
      $("#boardLabel").textContent = boardId;
      $("#connInfo").textContent = "已连接云端 · 手机电脑数据同步";
      startAutoRefresh();
      await renderPosts();
      return true;
    }

    async function renderPosts() {
      if (!supabase) return;
      const { data, error } = await supabase
        .from("share_posts")
        .select("*")
        .eq("board_id", boardId)
        .order("updated_at", { ascending: false });
      if (error) {
        showToast(error.message, true);
        return;
      }
      postsEl.replaceChildren();
      emptyEl.hidden = (data && data.length > 0);
      for (const post of data || []) {
        postsEl.appendChild(buildCard(post));
      }
    }

    function buildCard(post) {
      const card = document.createElement("article");
      card.className = "post";
      if (post.text) {
        const p = document.createElement("p");
        p.className = "post-text";
        p.textContent = post.text;
        card.appendChild(p);
      }
      if (post.link) {
        const a = document.createElement("a");
        a.className = "post-link";
        a.href = post.link;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = post.link;
        card.appendChild(a);
      }
      if (post.image_path) {
        const img = document.createElement("img");
        img.className = "post-image";
        img.src = publicImageUrl(post.image_path);
        img.alt = "分享图片";
        img.loading = "lazy";
        card.appendChild(img);
      }
      const meta = document.createElement("div");
      meta.className = "post-meta";
      const time = document.createElement("time");
      const edited = post.updated_at !== post.created_at;
      time.textContent = formatTime(post.updated_at) + (edited ? " · 已编辑" : "");
      meta.appendChild(time);
      const actions = document.createElement("div");
      actions.className = "post-actions";
      const editB = document.createElement("button");
      editB.type = "button";
      editB.className = "btn ghost small";
      editB.textContent = "编辑";
      editB.onclick = () => startEdit(post);
      const delB = document.createElement("button");
      delB.type = "button";
      delB.className = "btn ghost small danger";
      delB.textContent = "删除";
      delB.onclick = () => deletePost(post);
      actions.append(editB, delB);
      meta.appendChild(actions);
      card.appendChild(meta);
      return card;
    }

    async function uploadImage(file) {
      const ext = (file.name.split(".").pop() || "jpg").toLowerCase().replace(/[^a-z]/g, "") || "jpg";
      const path = boardId + "/" + Date.now() + "-" + Math.random().toString(36).slice(2, 8) + "." + ext;
      const { error } = await supabase.storage.from(BUCKET).upload(path, file, {
        cacheControl: "3600",
        upsert: false,
      });
      if (error) throw error;
      return path;
    }

    async function removeStoragePath(path) {
      if (!path) return;
      await supabase.storage.from(BUCKET).remove([path]);
    }

    function resetForm() {
      $("#editId").value = "";
      $("#postForm").reset();
      pendingFile = null;
      currentImagePath = "";
      $("#preview").hidden = true;
      $("#removeImageWrap").hidden = true;
      $("#removeImage").checked = false;
      $("#formTitle").textContent = "发表内容";
      $("#submitBtn").textContent = "发布";
      $("#cancelEdit").hidden = true;
    }

    function startEdit(post) {
      $("#editId").value = post.id;
      $("#text").value = post.text || "";
      $("#link").value = post.link || "";
      pendingFile = null;
      currentImagePath = post.image_path || "";
      $("#image").value = "";
      $("#removeImage").checked = false;
      if (currentImagePath) {
        $("#previewImg").src = publicImageUrl(currentImagePath);
        $("#preview").hidden = false;
        $("#removeImageWrap").hidden = false;
      } else {
        $("#preview").hidden = true;
        $("#removeImageWrap").hidden = true;
      }
      $("#formTitle").textContent = "编辑内容";
      $("#submitBtn").textContent = "保存";
      $("#cancelEdit").hidden = false;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deletePost(post) {
      if (!confirm("确定删除这条内容吗？")) return;
      if (post.image_path) await removeStoragePath(post.image_path);
      const { error } = await supabase.from("share_posts").delete().eq("id", post.id);
      if (error) {
        showToast(error.message, true);
        return;
      }
      showToast("已删除");
      if ($("#editId").value === post.id) resetForm();
      await renderPosts();
    }

    $("#image").addEventListener("change", () => {
      const file = $("#image").files[0];
      pendingFile = file || null;
      if (file) {
        $("#previewImg").src = URL.createObjectURL(file);
        $("#preview").hidden = false;
        $("#removeImage").checked = false;
      }
    });

    $("#cancelEdit").addEventListener("click", resetForm);
    $("#refreshBtn").addEventListener("click", () => renderPosts());
    $("#shareBtn").addEventListener("click", async () => {
      const link = shareUrl();
      try {
        await navigator.clipboard.writeText(link);
        showToast("分享链接已复制");
      } catch {
        prompt("复制此链接发给他人：", link);
      }
    });
    $("#settingsBtn").addEventListener("click", () => {
      appPanel.hidden = true;
      setupPanel.hidden = false;
      const c = loadConfig();
      if (c) {
        $("#cfgUrl").value = c.url || "";
        $("#cfgKey").value = c.key || "";
        $("#cfgBoard").value = c.board || "";
      }
    });

    $("#connectBtn").addEventListener("click", async () => {
      $("#connectBtn").disabled = true;
      await connect({
        url: $("#cfgUrl").value,
        key: $("#cfgKey").value,
        board: $("#cfgBoard").value,
      });
      $("#connectBtn").disabled = false;
    });

    $("#postForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!supabase) return;
      const text = $("#text").value.trim();
      const link = $("#link").value.trim();
      const editIdVal = $("#editId").value;
      if (!text && !link && !pendingFile && !currentImagePath && !$("#removeImage").checked) {
        showToast("请至少填写一项", true);
        return;
      }
      $("#submitBtn").disabled = true;
      try {
        let imagePath = currentImagePath;
        if ($("#removeImage").checked) {
          if (currentImagePath) await removeStoragePath(currentImagePath);
          imagePath = "";
        }
        if (pendingFile) {
          if (currentImagePath) await removeStoragePath(currentImagePath);
          imagePath = await uploadImage(pendingFile);
        }
        const ts = new Date().toISOString();
        if (editIdVal) {
          const { error } = await supabase.from("share_posts").update({
            text, link, image_path: imagePath, updated_at: ts,
          }).eq("id", editIdVal);
          if (error) throw error;
          showToast("已保存");
        } else {
          const { error } = await supabase.from("share_posts").insert({
            board_id: boardId, text, link, image_path: imagePath,
            created_at: ts, updated_at: ts,
          });
          if (error) throw error;
          showToast("发布成功");
        }
        resetForm();
        await renderPosts();
      } catch (err) {
        showToast(err.message || "操作失败", true);
      } finally {
        $("#submitBtn").disabled = false;
      }
    });

    (async function init() {
      const params = new URLSearchParams(location.search);
      const builtIn = getBuiltInConfig();
      const saved = loadConfig();
      const url = ($("#cfgUrl").value || params.get("url") || saved?.url || builtIn.url || "").trim();
      const key = ($("#cfgKey").value || saved?.key || builtIn.key || "").trim();
      const board = (params.get("board") || saved?.board || builtIn.board || "main").trim() || "main";

      $("#cfgUrl").value = url;
      $("#cfgKey").value = key;
      $("#cfgBoard").value = board;

      if (url && key) {
        await connect({ url, key, board });
      } else {
        setupPanel.hidden = false;
        appPanel.hidden = true;
      }
    })();
  </script>
</body>
</html>
